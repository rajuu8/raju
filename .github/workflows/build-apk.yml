name: Build APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-child-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: |
          cd android-child-app
          gradle wrapper --gradle-version 8.4 || true
          chmod +x gradlew || true

      - name: Build child app debug APK
        run: |
          cd android-child-app
          if [ ! -f gradlew ]; then gradle wrapper --gradle-version 8.4; fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload child app APK
        uses: actions/upload-artifact@v4
        with:
          name: child-app-debug-apk
          path: android-child-app/app/build/outputs/apk/debug/app-debug.apk

  build-parent-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build parent app debug APK
        run: |
          cd android-parent-app
          if [ ! -f gradlew ]; then gradle wrapper --gradle-version 8.4; fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload parent app APK
        uses: actions/upload-artifact@v4
        with:
          name: parent-app-debug-apk
          path: android-parent-app/app/build/outputs/apk/debug/app-debug.apk
